name: Build Windows Single-File EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PdfTableExtractor.sln

      - name: Build
        run: dotnet build PdfTableExtractor.sln -c Release

      - name: Publish (win-x64, single-file)
        run: dotnet publish src/PdfTableExtractor.App/PdfTableExtractor.App.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Show publish output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Path src/PdfTableExtractor.App/bin/Release -Filter *.exe | Select-Object FullName

      - name: Upload artifact (publish folder)
        uses: actions/upload-artifact@v4
        with:
          name: PdfTableExtractor_win-x64_publish
          path: src/PdfTableExtractor.App/bin/Release/**/win-x64/publish/**
          if-no-files-found: error
